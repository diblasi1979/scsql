services:
  mysql-internal:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: scsql
      MYSQL_USER: scsql
      MYSQL_PASSWORD: scsqlpass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3308:3306"
    volumes:
      - scsql-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-pscsqlpass", "-uscsql"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: backend/src/ScSql.Api/Dockerfile
    env_file:
      - path: ./.env.production
        required: false
    environment:
      ASPNETCORE_ENVIRONMENT: ${SCSQL_ASPNETCORE_ENVIRONMENT:-Production}
      TZ: ${SCSQL_TZ:-America/Argentina/Buenos_Aires}
      ConnectionStrings__InternalDatabase: ${SCSQL_INTERNAL_DB_CONNECTION:-server=mysql-internal;port=3306;database=scsql;user=scsql;password=scsqlpass}
      Jwt__Issuer: ${SCSQL_JWT_ISSUER:-scsql-api}
      Jwt__Audience: ${SCSQL_JWT_AUDIENCE:-scsql-admin}
      Jwt__Key: ${SCSQL_JWT_KEY:-change-this-in-production-with-a-long-random-key}
      AdminUser__Username: ${SCSQL_ADMIN_USERNAME:-admin}
      AdminUser__Password: ${SCSQL_ADMIN_PASSWORD:-admin123}
      Storage__RootPath: ${SCSQL_STORAGE_ROOT_PATH:-/app/storage}
      Storage__SqlPath: ${SCSQL_STORAGE_SQL_PATH:-/app/storage/sql}
      Scheduler__PollSeconds: ${SCSQL_SCHEDULER_POLL_SECONDS:-5}
      Scheduler__CatchUpWindowDays: ${SCSQL_SCHEDULER_CATCH_UP_WINDOW_DAYS:-7}
      Scheduler__TimeZoneId: ${SCSQL_SCHEDULER_TIME_ZONE_ID:-America/Argentina/Buenos_Aires}
      ConnectionSecurity__EncryptionKey: ${SCSQL_CONNECTION_ENCRYPTION_KEY:-scsql-dev-connection-key-change-in-production}
      Licensing__RequireValidLicense: ${SCSQL_LICENSING_REQUIRE_VALID_LICENSE:-false}
      Licensing__ProductCode: ${SCSQL_LICENSING_PRODUCT_CODE:-scsql}
      Licensing__PublicKeyPem: ${SCSQL_LICENSING_PUBLIC_KEY_PEM:-}
      Licensing__CurrentLicenseKey: ${SCSQL_LICENSING_CURRENT_LICENSE_KEY:-}
      Licensing__InstanceId: ${SCSQL_LICENSING_INSTANCE_ID:-}
    ports:
      - "2008:2008"
    volumes:
      - scsql-storage:/app/storage
    depends_on:
      mysql-internal:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - path: ./.env.production
        required: false
    environment:
      VITE_API_BASE_URL: ${SCSQL_VITE_API_BASE_URL:-http://localhost:2008/api}
    ports:
      - "1979:1979"
    depends_on:
      - api

volumes:
  scsql-storage:
  scsql-mysql-data: